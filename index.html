<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LISTAM | Dynamic Music Hub</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    <style>
        body { background-color: #030307; color: white; font-family: 'Vazirmatn', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: rgba(15, 15, 25, 0.95); border: 2px solid rgba(0, 255, 255, 0.3); padding: 25px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; }
        .logo-text { font-size: 40px; font-weight: 900; color: #fff; margin-bottom: 20px; text-shadow: 0 0 10px #00ffff; }
        .track-list { max-height: 300px; overflow-y: auto; margin-bottom: 15px; }
        .track-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.06); padding: 12px; margin-bottom: 10px; border-radius: 12px; cursor: pointer; border: 1px solid rgba(0, 255, 255, 0.2); }
        .player-box { background: rgba(0, 255, 255, 0.1); padding: 10px; border-radius: 15px; border: 1px solid #00ffff; }
    </style>
</head>
<body>
    <!-- موزیک پس‌زمینه آرام -->
    <audio id="bg-music" loop>
        <source src="https://dl.musicdel.ir/Music/1403/07/23/Mohsen%20Chavoshi%20-%20Hamin%20Moonde%20Bood.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="logo-text">LISTAM</div>
        <div id="track-list" class="track-list"></div>
        <div class="player-box">
            <audio id="main-audio" controls style="width:100%;"></audio>
        </div>
    </div>

    <script>
        const bgMusic = document.getElementById('bg-music');
        const mainAudio = document.getElementById('main-audio');
        
        // با اولین کلیک، موزیک پس‌زمینه شروع میشه
        document.body.addEventListener('click', () => { if(bgMusic.paused) bgMusic.play(); }, { once: true });

        const tracks = [
            { name: "Baby Nane's song", artist: "Mohsen Lorestani", src: "https://dl.rozmusic.com/Music/1400/05/09/Mohsen%20Lorestani%20-%20Bache%20Nane.mp3" },
            { name: "hey monaliza", artist: "Koorosh", src: "https://dl.musicsweb.ir/musics/01/12/unknown%20-%20hey%20monaliza%20-%20320%20-%20musicsweb.ir.mp3" },
            { name: "To Shakar khodayi", artist: "Savat", src: "https://dl.sevilmusics.com/cdn/music/srvrw/Savash%20-%20To%20Shahkar%20Khodaei%20[SevilMusic].mp3" },
            { name: "Boro NemiKhamet digeh", artist: "not found", src: "https://dl6.tarikhema.org/music/a/ahang-jadid/Ahang-JadidBoro-Boro-Boro-320.mp3" },
            { name: "Ruz Ashenayi", artist: "Farhad Jahangiri", src: "https://dl.musicdel.ir/Music/1401/01/farhad_jahangiri_rooz_ashnaei.mp3" },
            { name: "Bi Monam Egeh Rafti", artist: "not found", src: "https://dl.musicsweb.ir/musics/03/10/Dorcci%20-%20Ghatle%20Amd%20-%20320.mp3" },
            { name: "Bi Plane", artist: "not found", src: "https://irsv.upmusics.com/AliBZ/Bi%20palne%20Nok%20Tiz%20(320).mp3" },
            { name: "Albert Einstein", artist: "Hossein TM", src: "https://dl.aba-music.ir/music/1404/01/AlbertEinstein.mp3" },
            { name: "I miss you", artist: "Amir Tataloo", src: "https://dl.musictaj.com/song403/bhr/Man%20Delam%20Tange.mp3" },
            { name: "Mono Taneya Nezar", artist: "not found", src: "https://dls.musics-fa.com/tagdl/6e41/Arash%20Vala%20-%20Yadete%20(320).mp3" },
            { name: "Fandak Ko", artist: "not found", src: "https://dl.musicsweb.ir/musics/03/06/Unknown%20Artist%20-%20Fandak%20Ko%20-%20320.mp3" },
            { name: "they don't about us bts", artist: "BTS", src: "https://dl.musicdel.ir/tag/music/1405/01/05/BTS%20-%20they%20don%20t%20know%20bout%20us%20(320).mp3" },
            { name: "Nawan Junmi", artist: "not found", src: "https://dl.rozmusic.com/Music/1404/02/14/Novan%20-%20Joonami.mp3" },
            { name: "Ajab Baronieh", artist: "not found", src: "https://dls.musics-fa.com/tagdl/99/Novan%20-%20Ajab%20Baroonie%20(320).mp3" },
            { name: "Nparvaght To Bodi", artist: "Amir Tataloo", src: "https://dl.mokhtalefmusic.com/music/1398/02/25/Amir%20Tataloo%20-%20Harvaght%20Ke%20Boodi.mp3" },
            { name: "Divartam Mageh", artist: "not found", src: "https://dl.musictaj.com/song403/bhr/Mohsen%20Chavoshi%20-%20Divaretam%20Mage%20(Ai).mp3" },
            { name: "half of my life", artist: "not found", src: "https://dl.rozmusic.com/Music/1396/09/29/Hamid%20Hiraad%20-%20Nimeye%20Janam.mp3" },
            { name: "Didi Netonesti", artist: "not found", src: "https://dls.musics-fa.com/song/alibz/dlswm/Danial%20-%20Didi%20Natoonesti%20(320).mp3" },
            { name: "Tasian", artist: "Alireza Ghorbani", src: "https://dls.musics-fa.com/song/alibz/dlswm/Alireza%20Ghorbani%20-%20Tasian%20(320).mp3" },
            { name: "CpehmaDast", artist: "not found", src: "https://dl.rozmusic.com/Music/1404/09/05/Ashvan%20%26%20Mahyar%20-%20Hamdast.mp3" },
            { name: "Ba To Taneya", artist: "Amir Tataloo", src: "https://sv.jenabmusic.com/music/2025/11/14/Amir%20Tataloo%20-%20Ba%20To.mp3" },
            { name: "I Failed Every Time", artist: "not found", src: "https://dl.musictaj.com/song405/bhr/Tahas%20-%20Shekast%20Delam.mp3" },

            { name: "I'll Tell You Later", artist: "not found", src: "https://dl.rozmusic.com/Music/1404/03/12/Navid%20%26%20Nima%20-%20Joonam%20Barat%20Bege.mp3" },
            { name: "I Should Have Gone", artist: "Chavoshi", src: "https://dl.rozmusic.com/Music/1402/03/12/Mohsen%20Chavoshi%20-%20Man%20Bayad%20Miraftam.mp3" },
            { name: "Cpehmin Mondeh Bud", artist: "Chavoshi", src: "https://dl.rozmusic.com/Music/1403/07/23/Mohsen%20Chavoshi%20-%20Hamin%20Moonde%20Bood.mp3" },
            { name: "Wall Clock", artist: "Chavoshi", src: "https://dl.rozmusic.com/Music/1403/11/17/Mohsen%20Chavoshi%20-%20Saat%20Divari.mp3" },
            { name: "Ajab Omadi", artist: "Chavoshi", src: "https://dl.rozmusic.com/Music/1404/09/24/Mohsen%20Chavoshi%20-%20Ajab%20Oomadi.mp3" },
            { name: "Remix Of The Group Betage", artist: "not found", src: "https://dl.mokhtalefmusic.com/music/1403/03/10/Hayedeh%20To%20Dar%20Masafate%20Barani.mp3" },
            { name: "Akh Jana", artist: "not found", src: "https://irsv.upmusics.com/AliBZ/Akh%20Jana%20Nazanin%20Az%20Eshgh%20%20(320).mp3" },
            { name: "DiDi", artist: "Amir Tataloo", src: "https://dl.gisomusic.com/Music/1402/12/13/Amir%20Tataloo%20-%20Didi.mp3" },
            { name: "To Ghalbam", artist: "not found", src: "https://dl.musictaj.com/song403/bhr/To%20Ghalbam%20Toro%20Daram.mp3" }
        ];

        const listDiv = document.getElementById('track-list');
        tracks.forEach(t => {
            listDiv.innerHTML += `
                <div class="track-item" onclick="playTrack('${t.src}', this)">
                    <div><div style="font-weight:bold;">${t.name}</div><div style="font-size:11px; color:#888;">${t.artist}</div></div>
                    <span>🎵</span>
                </div>`;
        });

        function playTrack(src, el) {
            bgMusic.pause(); // پس‌زمینه قطع میشه
            mainAudio.src = src;
            mainAudio.play();
        }
        mainAudio.onpause = () => { bgMusic.play(); }; // اگه آهنگ اصلی قطع شد، پس‌زمینه برمیگرده
    </script>
</body>
</html>
